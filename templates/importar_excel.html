<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Excel - Azzas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
        .container { max-width: 760px; margin: 40px auto; background: white; border-radius: 10px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 16px; color: #1e3a8a; }
        .btn-acao { background: #1e40af; color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; text-decoration: none; }
        .btn-acao:hover { opacity: 0.95; }
        .field { margin-bottom: 16px; }
        input[type=file] { width: 100%; }
        .links { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Importar dados do Excel</h1>
        <p>Envie um arquivo .xlsx exportado no formato esperado (colunas: ID, Data, Usuario, Nome, Matricula, Departamento, Patrimonio, Modelo, Serial, Status, Motivo, Foto).</p>
        <form method="post" enctype="multipart/form-data">
            <div class="field">
                <label for="arquivo">Arquivo Excel (.xlsx):</label><br>
                <input type="file" name="arquivo" id="arquivo" accept=".xlsx" required>
            </div>
            <button type="submit" class="btn-acao">Importar</button>
        </form>
        <div class="links">
            <a href="{{ url_for('index') }}" class="btn-acao" style="background:#64748b; margin-top:10px; display:inline-block;">Voltar</a>
        </div>
    </div>
</body>
</html>
